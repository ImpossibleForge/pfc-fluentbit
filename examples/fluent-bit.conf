# Fluent Bit config for PFC-JSONL output
# Sends all logs to the pfc_forwarder daemon running on port 5170.

[SERVICE]
    Flush        1
    Log_Level    info
    Daemon       Off

# Example INPUT: tail log files
[INPUT]
    Name             tail
    Path             /var/log/myapp/*.log
    Tag              app.logs
    Parser           json
    Refresh_Interval 5

# Example INPUT: systemd journal
# [INPUT]
#     Name    systemd
#     Tag     host.*

# Route all logs to PFC Forwarder
[OUTPUT]
    Name    tcp
    Match   *
    Host    127.0.0.1
    Port    5170
    Format  json_lines

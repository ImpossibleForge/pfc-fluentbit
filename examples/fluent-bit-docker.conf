# Fluent Bit config for Docker Compose setup.
# Uses service name 'pfc-forwarder' as the TCP host (Docker internal DNS).
# For standalone (non-Docker) use, see fluent-bit.conf (uses 127.0.0.1).

[SERVICE]
    Flush        1
    Log_Level    info
    Daemon       Off

# Collect logs from all Docker containers
[INPUT]
    Name             tail
    Path             /var/lib/docker/containers/*/*.log
    Tag              docker.*
    Parser           docker
    DB               /var/log/flb_docker.db
    Refresh_Interval 5

# Route all logs to PFC Forwarder (Docker service name as host)
[OUTPUT]
    Name    tcp
    Match   *
    Host    pfc-forwarder
    Port    5170
    Format  json_lines
